<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Notegeli</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Caja app */
.login-box {
    width: 100%;
    max-width: 330px;
    background: #1c1c1c;
    padding: 28px 22px;
    border-radius: 14px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.45);
    text-align: center;
}

/* Logo */
.login-box img {
    height: 52px;
    margin-bottom: 6px;
}

/* Título */
.login-box h3 {
    margin-bottom: 18px;
    font-weight: bold;
}

/* Campos */
input {
    background: #2a2a2a;
    color: white;
    border: 1px solid #444;
    border-radius: 10px !important;
    padding: 10px;
}

/* Botón */
button {
    border-radius: 10px !important;
    padding: 10px;
}

/* Error */
.error {
    margin-top: 8px;
    font-size: 14px;
    color: #ff6b6b;
}

/* Footer */
footer {
    margin-top: 16px;
    font-size: 12px;
    opacity: 0.7;
}

footer img {
    height: 16px;
    vertical-align: middle;
    margin-right: 4px;
}

/* Móvil cómodo */
@media (max-width: 600px) {
    .login-box {
        max-width: 90%;
        padding: 25px 18px;
    }
    input {
        font-size: 16px; /* evita zoom de móvil */
    }
    button {
        font-size: 16px;
    }
    footer {
        font-size: 11px;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <img src="{{ url_for('static', filename='logogeli.png') }}">
    <h3>Notegeli</h3>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" class="form-control mb-2" autofocus>
        <input type="password" name="password" placeholder="Contraseña" class="form-control mb-3">
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <footer>
        <img src="{{ url_for('static', filename='logogeli.png') }}">
        Juan GePython — el creador
    </footer>
</div>

</body>
</html>
