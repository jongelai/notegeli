<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notegeli — Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}">
</head>
<body>

<div class="login-wrapper">

    <img src="{{ url_for('static', filename='logogeli.png') }}" class="login-logo">

    <div class="login-title">Notegeli</div>
    <div class="login-sub">Tu mini agenda personal</div>

    <form class="login-form" method="POST">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit" class="btn btn-primary">Entrar</button>

        {% if error %}
        <div class="text-danger mt-2" style="font-size:14px;">
            {{ error }}
        </div>
        {% endif %}
    </form>

</div>

</body>
</html>
