<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Acceso Notegeli</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}
.contenedor {
    background: #1c1c1c;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,.6);
}
input {
    margin: 10px 0;
    width: 90%;
    padding: 10px;
    border: none;
    border-radius: 6px;
}
button {
    background: #00aaff;
    border: none;
    padding: 10px 20px;
    margin-top: 15px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
button:hover {
    background: #0080cc;
}
.error {
    margin-top: 10px;
    color: #ff5555;
}
</style>
</head>
<body>
<div class="contenedor">
    <h2>NOTEGELI</h2>
    <form method="POST">
        <input name="usuario" placeholder="Usuario">
        <input type="password" name="password" placeholder="Contraseña">
        <button>Entrar</button>
    </form>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>
</body>
</html>
