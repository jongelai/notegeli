<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli — Login</title>

<!-- PWA -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#000000">

<!-- Apple -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Notegeli">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/192.png') }}">

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}?v=3">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;padding:20px;">

<!-- Logo Login -->
<img src="{{ url_for('static', filename='logogeli.png') }}" class="login-logo">


<div style="font-size:26px;font-weight:700;margin-bottom:4px;color:white;">
    Agenda2026
</div>

<div style="font-size:14px;opacity:0.75;margin-bottom:20px;color:white;">
    Tu mini agenda personal
</div>

<form method="POST" style="width:100%;max-width:340px;">
    <input type="text" name="usuario" placeholder="Usuario" required
           class="form-control mb-2" style="background:#1c1c1e;border:none;color:white;">
    
    <input type="password" name="password" placeholder="Contraseña" required
           class="form-control mb-3" style="background:#1c1c1e;border:none;color:white;">
    
    <button type="submit" class="btn btn-primary w-100" style="padding:10px 0;">
        Entrar
    </button>

    {% if error %}
    <div class="text-danger mt-3 text-center" style="font-size:14px;">
        {{ error }}
    </div>
    {% endif %}
</form>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/service-worker.js");
}
</script>

</body>
</html>
