<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="container">

<div class="header">
    <div class="header-title">
        <img src="{{ url_for('static', filename='logogeli.png') }}">
        <h2 class="m-0">Notegeli</h2>
    </div>
    <a href="/logout" class="btn btn-danger btn-sm">
        <i class="bi bi-box-arrow-right"></i> Salir
    </a>
</div>

<form method="POST" class="mb-3">
    <textarea name="texto" rows="3" class="form-control mb-2" placeholder="Nueva nota..."></textarea>
    <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-plus"></i> Añadir Nota
    </button>
</form>

{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>

    {% for a in archivos %}
    <div class="card flex-column">

        <div class="flex-grow-1">
            <div class="filename">{{ formatear(a) }}</div>
            <div class="preview">{{ previews[a] }}</div>
        </div>

        <div class="actions mt-2">
            <a href="/editar/{{a}}" class="btn btn-warning btn-sm">
                <i class="bi bi-pencil"></i> Editar
            </a>
            <a href="/descargar/{{a}}" class="btn btn-info btn-sm">
                <i class="bi bi-download"></i> Descargar
            </a>
            <a href="/borrar/{{a}}" class="btn btn-danger btn-sm">
                <i class="bi bi-trash"></i> <span>Borrar</span>
            </a>
        </div>

    </div>
    {% endfor %}
{% endfor %}

<footer>
    <img src="{{ url_for('static', filename='logogeli.png') }}">
    Juan Geli PythonHtml 
</footer>

</body>
</html>
