<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli</title>

<!-- PWA -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#000000">

<!-- Apple PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Notegeli">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/192.png') }}">

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}?v=3">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="container py-2">

<!-- Header -->
<div class="header" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <img src="{{ url_for('static', filename='icons/192.png') }}"
         style="height:34px;width:auto;border-radius:8px;">
    <div class="title-pro" style="font-size:26px;font-weight:700;color:white;">
        AGENDA 2026
    </div>
</div>

<!-- Nueva Nota -->
<form method="POST" class="mb-3">
    <textarea name="texto" rows="4" class="form-control" placeholder="Nueva nota..."></textarea>

    <div class="botones-nueva-nota mt-2">
        <button type="submit" class="btn btn-primary btn-add">
            <i class="bi bi-plus"></i> Añadir
        </button>
        <a href="/logout" class="btn btn-danger btn-salir">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</form>

<!-- Listado -->
{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>

    {% for a in archivos %}
        <div class="card">
            <div class="filename">{{ formatear(a) }}</div>
            <div class="preview">{{ previews[a] }}</div>
        </div>

        <div class="actions">
            <a href="/editar/{{a}}" class="btn btn-warning btn-sm">
                <i class="bi bi-pencil"></i> <span>Editar</span>
            </a>
            <a href="/borrar/{{a}}" class="btn btn-danger btn-sm">
                <i class="bi bi-trash"></i>
            </a>
        </div>
    {% endfor %}
{% endfor %}

<footer style="opacity:0.7;text-align:center;margin-top:40px;font-size:13px;">
    Notegeli — Flask PWA 2026
</footer>


<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
