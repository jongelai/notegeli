<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#111216">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}?v=10">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="container py-2">

<div class="header mb-3">
    <img src="{{ url_for('static', filename='icons/192.png') }}" style="height:34px;width:auto;border-radius:8px;">
    <div class="title-pro">Agenda 2026</div>
</div>

<form method="POST" class="mb-3">
    <textarea name="texto" rows="4" class="form-control" placeholder="Nueva nota..."></textarea>

    <div class="botones-nueva-nota">
        <button type="submit" class="btn btn-primary btn-add">
            <i class="bi bi-plus"></i> Añadir
        </button>
        <a href="/logout" class="btn btn-danger btn-salir">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</form>

<div class="notes-wrapper">
{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>
    {% for a in archivos %}
        <div class="note horizontal">

            <a href="/editar/{{a}}" class="card" style="text-decoration:none;color:black;">
                <div class="filename">{{ formatear(a) }}</div>
                <div class="preview">{{ previews[a] }}</div>
            </a>

            <button class="btn btn-danger btn-icon btn-borrar" data-archivo="{{ a }}">
                <i class="bi bi-trash"></i>
            </button>

        </div>
    {% endfor %}
{% endfor %}
</div>

<!-- MODAL BORRAR -->
<div class="modal fade" id="modalConfirmar" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-body">
        ¿Eliminar esta nota?
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" id="btnConfirmarBorrar" class="btn btn-danger">Borrar</button>
      </div>
    </div>
  </div>
</div>

<footer class="app-footer">
    <img src="{{ url_for('static', filename='logogeli.png') }}">
    <span class="footer-text">Notegeli — Flask PWA 2026</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let borrarArchivo = null;

document.querySelectorAll(".btn-borrar").forEach(boton => {
    boton.addEventListener("click", () => {
        borrarArchivo = boton.dataset.archivo;
        let m = new bootstrap.Modal(document.getElementById("modalConfirmar"));
        m.show();
    });
});

document.getElementById("btnConfirmarBorrar").addEventListener("click", () => {
    if (!borrarArchivo) return;
    window.location.assign("/borrar/" + borrarArchivo);
});
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
