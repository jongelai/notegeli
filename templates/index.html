<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notegeli</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.header img {
    height: 35px;
    margin-right: 8px;
}

.header-title {
    display: flex;
    align-items: center;
}

textarea {
    background: #1c1c1c;
    color: white;
    border: 1px solid #333;
    border-radius: 10px;
}

/* --- Tarjetas estilo chat --- */
.card {
    background: #1a1a1a;
    border: none;
    border-radius: 14px;
    margin-bottom: 10px;
    padding: 10px 12px;
    color: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

.filename {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: bold;
    font-size: 15px;
}

/* --- Preview (Obsidian/Notion style) --- */
.preview {
    opacity: 0.8;
    font-size: 14px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* acciones de los botones */
.actions {
    display: flex;
    gap: 6px;
}

.grupo-titulo {
    margin-top: 18px;
    margin-bottom: 6px;
    font-weight: bold;
    font-size: 16px;
    opacity: 0.85;
}

/* --- Footer --- */
footer {
    margin-top: 25px;
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
}

footer img {
    height: 18px;
    vertical-align: middle;
    margin-right: 4px;
}

/* --- Versión móvil (cómodo) --- */
@media (max-width: 600px) {

    body {
        padding: 12px !important;
    }

    .header h2 {
        font-size: 22px;
        margin-bottom: 0;
    }

    .card {
        padding: 12px 14px;
        border-radius: 16px;
        font-size: 15px;
        margin-bottom: 12px;
    }

    .btn-sm {
        padding: 6px 8px !important;
        font-size: 14px !important;
        border-radius: 8px;
    }

    .preview {
        font-size: 15px;
    }

    .grupo-titulo {
        font-size: 15px;
        margin-top: 20px;
        margin-bottom: 8px;
    }

    footer {
        font-size: 11px;
        margin-top: 28px;
    }
}
</style>
</head>

<body class="container py-3">

<div class="header">
    <div class="header-title">
        <img src="{{ url_for('static', filename='logogeli.png') }}">
        <h2 class="m-0">\ Agenda 2026</h2>
    </div>
    <a href="/logout" class="btn btn-sm btn-danger">
        <i class="bi bi-box-arrow-right"></i> Salir
    </a>
</div>

<form method="POST" class="mb-3">
    <textarea name="texto" rows="3" class="form-control mb-2" placeholder="Nueva nota..."></textarea>
    <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-plus-lg"></i> Añadir Nota
    </button>
</form>

{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>

    {% for a in archivos %}
    <div class="card">
        <div class="d-flex align-items-center">
            <div class="flex-grow-1">
                <span class="filename">{{ formatear(a) }}</span>
                <div class="preview">{{ previews[a] }}</div>
            </div>
            <div class="actions">
                <a href="/editar/{{a}}" class="btn btn-sm btn-warning">
                    <i class="bi bi-pencil"></i>
                </a>
                <a href="/descargar/{{a}}" class="btn btn-sm btn-info">
                    <i class="bi bi-download"></i>
                </a>
                <a href="/borrar/{{a}}" class="btn btn-sm btn-danger">
                    <i class="bi bi-trash"></i>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
{% endfor %}

<footer>
    <img src="{{ url_for('static', filename='logogeli.png') }}">
    Juan GePython — el creador
</footer>

</body>
</html>
