<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Notegeli">
<link rel="apple-touch-icon" href="/static/icons/192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}?v=2">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="container">

<!-- Header con logo -->
<div class="header">
    <img class="logo" src="{{ url_for('static', filename='logogeli.png') }}">
    <div class="title-pro">AGENDA 2026</div>
</div>


<!-- Nueva Nota estilo WhatsApp/iMessage -->
<form method="POST" class="mb-3">
    <textarea name="texto" rows="4" class="form-control" placeholder="Nueva nota..."></textarea>

    <div class="botones-nueva-nota mt-2">
    <button type="submit" class="btn btn-primary btn-add">
        <i class="bi bi-plus"></i> Añadir
    </button>
    <a href="/logout" class="btn btn-danger btn-salir">
        <i class="bi bi-box-arrow-right"></i>
    </a>
</div>

</form>

<!-- Listado de Notas -->
{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>

    {% for a in archivos %}
        <!-- Tarjeta con preview -->
        <div class="card">
            <div class="filename">{{ formatear(a) }}</div>
            <div class="preview">{{ previews[a] }}</div>
        </div>

        <!-- Acciones fuera de la tarjeta -->
        <div class="actions">
            <a href="/editar/{{a}}" class="btn btn-warning btn-sm">
                <i class="bi bi-pencil"></i> <span>Editar</span>
            </a>
            
                
            </a>
            <a href="/borrar/{{a}}" class="btn btn-danger btn-sm">
            <i class="bi bi-trash"></i>
        </a>
</div>

    {% endfor %}
{% endfor %}

<footer>
    <img src="{{ url_for('static', filename='logogeli.png') }}">
    Juan GePython.html.flask
</footer>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/service-worker.js");
}
</script>


}
</script>

</body>
</html>
