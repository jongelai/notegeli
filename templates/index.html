<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body class="container py-4 bg-light">

    <h1 class="mb-4">Agenda de Notas</h1>

    <form method="POST" class="mb-4">
        <textarea 
            name="texto" 
            rows="5" 
            class="form-control mb-3" 
            placeholder="Escribe tu nota aquí..."
        ></textarea>

        <button type="submit" class="btn btn-primary">Guardar Nota</button>
    </form>

    <h2 class="h5 mt-4">Notas guardadas</h2>

    {% if grupos %}
        {% for grupo, items in grupos.items() %}
            <h3 class="mt-4">{{ grupo }}</h3>
            <ul class="list-group mb-3">
                {% for a in items %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span class="flex-grow-1">{{ a }}</span>
                    <div>
                        <a href="/editar/{{a}}" class="btn btn-sm btn-warning me-2">Editar</a>
                        <a href="/descargar/{{a}}" class="btn btn-sm btn-info me-2">Descargar</a>
                        <a href="/borrar/{{a}}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a>

                    </div>
                </li>
                {% endfor %}
            </ul>
        {% endfor %}
    {% else %}
        <p class="text-muted">No tienes notas guardadas todavía.</p>
    {% endif %}

</body>
</html>
