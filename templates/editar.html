<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editar Nota</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Notegeli">
<link rel="apple-touch-icon" href="/static/icons/192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='notegeli.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="container py-3">

<div class="header mb-3">
    <div class="header-title">
        <img src="{{ url_for('static', filename='logogeli.png') }}">
        <h2 class="m-0">Editar Nota</h2>
    </div>
    <a href="/" class="btn btn-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

<form method="POST">
    <textarea name="texto" rows="10" class="form-control mb-3">{{contenido}}</textarea>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-fill">
            <i class="bi bi-check-lg"></i> Guardar
        </button>
        <a href="/" class="btn btn-secondary flex-fill">
            <i class="bi bi-x-lg"></i> Cancelar
        </a>
    </div>
</form>

</body>
</html>
