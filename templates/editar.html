<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: #121212;
        color: white;
        font-family: Arial, sans-serif;
        padding: 16px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 12px;
        font-weight: bold;
    }

    textarea {
        background: #1c1c1c;
        color: white;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 12px;
        font-size: 16px; /* evita zoom móvil */
        min-height: 280px;
    }

    .btn {
        border-radius: 10px;
        padding: 10px 14px;
    }

    /* Móvil cómodo */
    @media (max-width: 600px) {
        h1 {
            font-size: 20px;
        }

        .btn {
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .btn-secondary {
            margin-left: 0 !important;
        }
    }
    </style>
</head>

<body>

<h1>Editar</h1>

<form method="POST">
    <textarea name="texto">{{contenido}}</textarea>

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

</body>
</html>
