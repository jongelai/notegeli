<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notegeli</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}
.card {
    background: #1c1c1c;
    border: none;
    margin-bottom: 10px;
}
.grupo-titulo {
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: bold;
    font-size: 18px;
}
textarea {
    background: #1c1c1c;
    color: white;
    border: 1px solid #333;
}
button, .btn {
    border-radius: 8px;
}
</style>
</head>
<body class="container py-3">

<div class="header">
    <h2>Notegeli</h2>
    <a href="/logout" class="btn btn-sm btn-danger">
        <i class="bi bi-box-arrow-right"></i> Salir
    </a>
</div>

<form method="POST" class="mb-3">
    <textarea name="texto" rows="3" class="form-control mb-2" placeholder="Nueva nota..."></textarea>
    <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-plus-lg"></i> Añadir Nota
    </button>
</form>

{% for grupo, archivos in grupos.items() %}
    <div class="grupo-titulo">{{ grupo }}</div>

    {% for a in archivos %}
        <div class="card p-2">
            <div class="d-flex justify-content-between align-items-center">
                <span>{{ a }}</span>
                <div>
                    <a href="/editar/{{a}}" class="btn btn-sm btn-warning me-1">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="/descargar/{{a}}" class="btn btn-sm btn-info me-1">
                        <i class="bi bi-download"></i>
                    </a>
                    <a href="/borrar/{{a}}" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    {% endfor %}
{% endfor %}

</body>
</html>
